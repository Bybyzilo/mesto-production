<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesto Russia</title>
  <script type="module" crossorigin src="./assets/index-6UXzq4ql.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-9W9qPr6c.css">
</head>
<body class="page">
  <div class="page__content">
    <header class="header page__section">
      <div class="logo header__logo">
        <svg fill="none" viewBox="0 0 142 33" xmlns="http://www.w3.org/2000/svg">
           <text x="0" y="24" fill="white" font-size="28" font-weight="900" font-family="Arial">Mesto</text>
           <text x="85" y="10" fill="white" font-size="10" font-family="Arial">Russia</text>
        </svg>
      </div>
    </header>

    <main class="content">
      <section class="profile page__section">
        <div class="profile__image-container">
          <img class="profile__image" src="" alt="Аватар профиля">
          <button class="profile__image-edit-button" type="button" aria-label="Сменить аватар"></button>
        </div>
        <div class="profile__info">
          <h1 class="profile__title"></h1>
          <button class="profile__edit-button" type="button" aria-label="Редактировать профиль"></button>
          <p class="profile__description"></p>
        </div>
        <button class="profile__add-button" type="button" aria-label="Добавить место"></button>
      </section>

      <section class="places page__section">
        <ul class="places__list"></ul>
      </section>
    </main>

    <footer class="footer page__section">
      <p class="footer__copyright">© 2026 Mesto Russia</p>
    </footer>

    <!-- Редактировать профиль -->
    <div class="popup popup_type_edit">
      <div class="popup__container">
        <button class="popup__close" type="button" aria-label="Закрыть"></button>
        <h2 class="popup__title">Редактировать профиль</h2>
        <form class="popup__form" name="edit-profile" novalidate>
          <input id="name-input" type="text" name="name" class="popup__input popup__input_type_name" placeholder="Имя" minlength="2" maxlength="40" pattern="^[a-zA-Zа-яА-ЯёЁ\-\s]+$" data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы" required>
          <span class="popup__error name-input-error"></span>
          <input id="description-input" type="text" name="description" class="popup__input popup__input_type_description" placeholder="Занятие" minlength="2" maxlength="200" required>
          <span class="popup__error description-input-error"></span>
          <button class="popup__button" type="submit">Сохранить</button>
        </form>
      </div>
    </div>

    <!-- Новое место -->
    <div class="popup popup_type_new-card">
      <div class="popup__container">
        <button class="popup__close" type="button" aria-label="Закрыть"></button>
        <h2 class="popup__title">Новое место</h2>
        <form class="popup__form" name="new-card" novalidate>
          <input id="placename-input" type="text" name="placename" class="popup__input popup__input_type_card-name" placeholder="Название" minlength="2" maxlength="30" pattern="^[a-zA-Zа-яА-ЯёЁ\-\s]+$" data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы" required>
          <span class="popup__error placename-input-error"></span>
          <input id="url-input" type="url" name="link" class="popup__input popup__input_type_url" placeholder="Ссылка на картинку" required>
          <span class="popup__error url-input-error"></span>
          <button class="popup__button" type="submit">Создать</button>
        </form>
      </div>
    </div>

    <!-- Обновить аватар -->
    <div class="popup popup_type_avatar">
      <div class="popup__container">
        <button class="popup__close" type="button" aria-label="Закрыть"></button>
        <h2 class="popup__title">Обновить аватар</h2>
        <form class="popup__form" name="edit-avatar" novalidate>
          <input id="avatar-url-input" type="url" name="avatar" class="popup__input popup__input_type_avatar-url" placeholder="Ссылка на изображение" required>
          <span class="popup__error avatar-url-input-error"></span>
          <button class="popup__button" type="submit">Сохранить</button>
        </form>
      </div>
    </div>

    <!-- Подтверждение удаления -->
    <div class="popup popup_type_delete-confirm">
      <div class="popup__container">
        <button class="popup__close" type="button" aria-label="Закрыть"></button>
        <h2 class="popup__title">Вы уверены?</h2>
        <form class="popup__form" name="delete-confirm" novalidate>
          <button class="popup__button" type="submit">Да</button>
        </form>
      </div>
    </div>

    <!-- Попап картинки -->
    <div class="popup popup_type_image">
      <div class="popup__image-container">
        <button class="popup__close" type="button" aria-label="Закрыть"></button>
        <img class="popup__image" src="" alt="">
        <p class="popup__caption"></p>
      </div>
    </div>

    <!-- Попап статистики -->
    <div class="popup popup_type_info">
      <div class="popup__container">
        <button class="popup__close" type="button" aria-label="Закрыть"></button>
        <h2 class="popup__title">Статистика карточек</h2>
        <div class="popup__info-list"></div>
      </div>
    </div>

  </div> <!-- page__content -->

  <template id="card-template">
    <li class="places__item card">
      <img class="card__image" src="" alt="">
      <button class="card__delete-button" type="button" aria-label="Удалить карточку"></button>
      <div class="card__description">
        <h2 class="card__title"></h2>
        <div class="card__like-container">
          <button class="card__like-button" type="button" aria-label="Поставить лайк"></button>
          <span class="card__like-count">0</span>
        </div>
      </div>
    </li>
  </template>

  <template id="popup-info-definition-template">
    <div class="popup__definition">
      <span class="popup__definition-term"></span>
      <span class="popup__definition-value"></span>
    </div>
  </template>
  <template id="popup-info-user-preview-template">
    <li class="popup__user-preview"></li>
  </template>

</body>
</html>

<!-- проверка workflow -->
